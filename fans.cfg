#####################################################################
#	Fan Control
#####################################################################

[heater_fan hotend_fan]
##	Hotend Fan - FAN0 Connector
##  Uncomment below for SpiderVersion 1.x
#pin: PB0
##  Uncomment below for SpiderVersion 2.2
#pin: PA13
max_power: 1.0
kick_start_time: 0.5
heater: extruder
heater_temp: 50.0
##	If you are experiencing back flow, you can reduce fan_speed
#fan_speed: 1.0

[fan]
##	Print Cooling Fan - FAN1 Connector
##  Uncomment below for SpiderVersion 1.x
#pin: PB1
##  Uncomment below for SpiderVersion 2.2
#pin: PA14
max_power: 1.0
kick_start_time: 0.5
##	Depending on your fan, you may need to increase this value
##	if your fan will not start. Can change cycle_time (increase)
##	if your fan is not able to slow down effectively
off_below: 0.10

[heater_fan electronic_deck_fan]
##	Controller fan - FAN2 Connector
pin: PB2
max_power: 1
kick_start_time: 0.5
heater: heater_bed
heater_temp: 20.0

[fan_generic exhaust_fan]
##  Exhaust fan - In E2 OUT Positon
pin: PB3
max_power: 1.0
shutdown_speed: 0.0
kick_start_time: 5.0
#heater: heater_bed
#heater_temp: 80
#fan_speed: 0.5

[fan_generic filter]
pin: PB15
#cycle_time: 0.05
kick_start_time: 0.5
#[output_pin BedFans]
#pin: PB15
#value: 0
#shutdown_value: 0

#[controller_fan nevermore]
# Nevermore - In E1 OUT Position
#pin: PC8
#kick_start_time: 0.500
#fan_speed: 0.5

[controller_fan stepper_driver_fan]
pin: PA14
max_power: 0.8
kick_start_time: 0.5
stepper: stepper_x
idle_timeout: 180
idle_speed: 0.1