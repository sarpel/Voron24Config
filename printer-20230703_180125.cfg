[include filament.cfg]
[include simple-stealthburner_leds.cfg]
[include fans.cfg]
[include probe.cfg]
[include stepper_xy.cfg]
[include stepper_z.cfg]
[include leds.cfg]
[include macros.cfg]
[include tmc.cfg]
[include sensorless.cfg]
[include TEST_SPEED.cfg]
#[include macro.cfg]
